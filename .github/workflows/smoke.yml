name: Smoke

# Run the Phase 6a smoke-test harness on every push and PR. Builds the
# hub, installs into a staging tree, then runs tests/smoke/run.py which
# starts the hub on offset test ports and exercises the protocol path
# (plain + TLS handshake + plugin-load log scan).
#
# Separate from release.yml because the triggers differ: smoke runs
# everywhere, release runs only on tag pushes and release branches.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run JavaScript-based actions on Node.js 24, see release.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-linux:
    name: Smoke Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev zlib1g-dev lua5.4

      # Pure-Lua unit test for the Phase 8 framing pipeline
      # (core/iostream.lua). Byte/string logic only, no OS specifics,
      # so the canonical Linux job is sufficient - it does not need the
      # built hub. Run before the build so a framing-logic regression
      # fails fast. The CMake build deliberately ships Lua as a library
      # only (no standalone interpreter), hence the system lua5.4.
      - name: Run iostream unit test
        run: lua5.4 tests/unit/iostream_test.lua

      # Phase 8 S5 BLOM bloom filter (pure Lua, same rationale as
      # the iostream test).
      - name: Run bloom unit test
        run: lua5.4 tests/unit/bloom_test.lua

      - name: Run sysinfo unit test
        run: lua5.4 tests/unit/sysinfo_test.lua

      # Phase 1b of #82 HTTP API: router unit tests cover the pure-Lua
      # bits (constant_time_eq, schema validator, envelope helpers,
      # token resolution, request-id shape, register guards).
      - name: Run http_router unit test
        run: lua5.4 tests/unit/http_router_test.lua

      # Phase 2 PR-B of #82: util_http.http_register_user_action helper
      # tests cover the preflight (sid + online + non-bot), the
      # §7.1.1 response envelope construction, the spoof-guard that
      # drops handler-supplied convention fields, and the fail-soft
      # registration path.
      - name: Run util_http unit test
        run: lua5.4 tests/unit/util_http_test.lua

      # #266 plugin sandbox bypass: util.safe_path centralises the path
      # gate; tests cover the helper itself and that checkfile /
      # atomic_write / maketable / savetable / savearray reject unsafe
      # paths BEFORE invoking io.open.
      - name: Run util_safe_path unit test
        run: lua5.4 tests/unit/util_safe_path_test.lua

      - name: Run util_makedir unit test
        run: lua5.4 tests/unit/util_makedir_test.lua

      # core/ensuredirs.lua (#78 follow-up): boot-time runtime-directory
      # self-heal (log/, cfg/, certs/, scripts/data/, cfg/geoip/).
      - name: Run ensuredirs unit test
        run: lua5.4 tests/unit/ensuredirs_test.lua

      # core/cfg_secret.lua: first-boot master.key generation creates the
      # key's parent dir before writing (operator-relocated-path crash fix).
      - name: Run cfg_secret unit test
        run: lua5.4 tests/unit/cfg_secret_test.lua

      # #275 COV-7: core/http_filter.lua (#264) shared filter/sort/
      # paginate helper. Smoke covers wire-up of each list endpoint;
      # this unit test covers the helper's string / integer (+_min /
      # _max) / boolean / date (+ _after / _before) semantics, sort
      # direction, pagination clamping, unknown-field rejection,
      # and input-mutation safety.
      - name: Run http_filter unit test
        run: lua5.4 tests/unit/http_filter_test.lua

      # core/http_client.lua (#82 follow-up): non-blocking outbound
      # HTTP(S) client. Unit test covers the pure helpers (url parse,
      # request build incl. Host/Connection spoof-guard, response
      # parse); the non-blocking state machine is smoke-tested against
      # a loopback server.
      - name: Run http_client unit test
        run: lua5.4 tests/unit/http_client_test.lua

      # core/hbri.lua (#214 / #291 / #286): unit test for the pure
      # activation gate (active()) and eligibility (eligible()); the
      # side-channel paths are smoke-tested. #294 locks "no plain port
      # on a family -> active() false".
      - name: Run hbri unit test
        run: lua5.4 tests/unit/hbri_test.lua

      # #301 PR-1: lang-table coverage. Verifies every i18n key required
      # by core/hub.lua exists in BOTH lang/de.tbl and en.tbl
      # (missing keys would silently fall through to the hardcoded
      # English default), plus the de/en parity that future translation
      # tooling depends on.
      - name: Run lang unit test
        run: lua5.4 tests/unit/lang_test.lua

      # Repo-wide plugin lang-key consistency. For every bundled plugin
      # that ships lang files, scans the source for each lang.X reference
      # and asserts X is defined in both .lang.de and .lang.en. Catches
      # the drift class that silently kills a translation: the lookup
      # returns nil, the `or "<english>"` fallback fires, and no error is
      # ever raised. Supersedes the former usr_share-only test (#301 PR-2,
      # lang.msg_minmax vs msg_sharelimits) - usr_share is one of the ~68
      # plugins swept here, so coverage is a strict superset. Generalised
      # after the same bug reappeared in etc_cmdlog (lang.failmsg1/2 vs
      # msg_denied/msg_nofile), which the one-plugin test could not see.
      - name: Run plugin lang unit test
        run: lua5.4 tests/unit/plugin_lang_test.lua

      # #327 etc_aliases: HTTP API surface + reload-safety. Exercises
      # all four +addalias reject branches (bad_alias / conflict_command
      # / exists / no_target), GET sorting, DELETE happy + not_found,
      # and the +reload semantic (re-running onStart re-loads from disk).
      - name: Run etc_aliases unit test
        run: lua5.4 tests/unit/etc_aliases_test.lua

      # #355 cmd_gag: the ADC +gag path must reject a bot target
      # (regression - bot-guard mirrors the other user-action commands).
      - name: Run cmd_gag bot-guard unit test
        run: lua5.4 tests/unit/cmd_gag_bot_test.lua

      # #356 etc_hubcommands: the bare-word "Did you mean +X?" hint must
      # only fire for a command the user may run (no chat-swallow / no
      # op-command-name leak to unprivileged users); the literal-bracket
      # branch stays ungated so it keeps swallowing (#137 cred leak).
      - name: Run etc_hubcommands unit test
        run: lua5.4 tests/unit/etc_hubcommands_test.lua

      # #84 audit: event-shape contract + actor / target snapshot +
      # reason / meta normalization. Pure helper, no hub state needed.
      - name: Run audit unit test
        run: lua5.4 tests/unit/audit_test.lua

      # #81 etc_clientblocker: HTTP API surface + ADC hub-cmd handlers
      # + onConnect check_clients listener. Stubbed user/cfg/hub/util/
      # audit; verifies the level-exempt branch, F-INF-1d nil-VE guard,
      # +reload semantic, and audit fire shape on add/remove/kick.
      - name: Run etc_clientblocker unit test
        run: lua5.4 tests/unit/etc_clientblocker_test.lua

      # Coverage completeness: these two unit tests existed but were never
      # wired into CI. Both pass; registering them keeps tests/README's
      # "the whole tests/unit set runs in CI" statement true.
      - name: Run etc_blocklist unit test
        run: lua5.4 tests/unit/etc_blocklist_test.lua

      - name: Run etc_whitelist unit test
        run: lua5.4 tests/unit/etc_whitelist_test.lua

      - name: Run cmd_usercleaner orphan unit test
        run: lua5.4 tests/unit/cmd_usercleaner_orphan_test.lua

      # #78 Precursor 0c: core/secrets.lua sensitive-key registry +
      # env-var-first cfg lookup. Stubbed cfg + os.getenv; verifies
      # registry semantics, _derive_env_name shape, and the env-vs-
      # cfg precedence + empty-string-as-unset semantics.
      - name: Run secrets unit test
        run: lua5.4 tests/unit/secrets_test.lua

      # core/ratelimit.lua per-IP accept guard. Regression: accept_ip(nil)
      # must not crash - server.lua passes a nil clientip when getpeername()
      # races with a peer reset, which used to raise in the accept loop and
      # take the listener down (Sopor, 3.1.11). Plus limiter-still-works
      # sanity + disabled-passthrough.
      - name: Run ratelimit unit test
        run: lua5.4 tests/unit/ratelimit_test.lua

      # Regression: a bundled plugin reading a cfg key at module scope
      # (etc_prometheus_activate) crashed at plugin load when the key was
      # absent from BOTH the operator cfg.tbl AND cfg_defaults.lua -
      # cfg.get indexes _defaultsettings[key][1] on nil. Loads the real
      # cfg_defaults settings table and reproduces cfg.get's lookup path.
      - name: Run cfg_defaults unit test
        run: lua5.4 tests/unit/cfg_defaults_test.lua

      # #78 Precursor 0d: core/sha256.lua pure-Lua FIPS 180-4. Verifies
      # 8 canonical NIST vectors (empty / abc / message digest /
      # alphabet / alphanumeric / 55-byte / 112-byte / 1M-char) plus
      # the boundary scan around the 56-byte single-block padding edge.
      - name: Run sha256 unit test
        run: lua5.4 tests/unit/sha256_test.lua

      # core/hmac.lua HMAC-SHA256 (RFC 2104). Verifies the RFC 4231
      # vectors (incl. the key > block-size pre-hash branch), the raw-
      # vs-hex surface, tamper detection, and argument validation.
      - name: Run hmac unit test
        run: lua5.4 tests/unit/hmac_test.lua

      # core/backup_archive.lua (#480 P0): ustar writer/reader, PBKDF2-
      # HMAC-SHA256 KDF (Python-verified vectors), manifest and the full
      # pack()/unpack() plumbing via a fake identity crypto. The real
      # AES-256-GCM round-trip is the crypto test below (Linux-only).
      - name: Run backup_archive unit test
        run: lua5.4 tests/unit/backup_archive_test.lua

      # #78 Precursor 0d: core/cacert_bootstrap.lua reconcile_bundle
      # decision-matrix (source-missing / installed / no-op / warned /
      # auto-updated branches). Uses OS temp dir for file fixtures.
      - name: Run cacert_bootstrap unit test
        run: lua5.4 tests/unit/cacert_bootstrap_test.lua

      # #78 Phase A: core/ipmatch.lua pure-Lua IPv4/IPv6/CIDR
      # primitives. 67 checks across v4 + v6 parse / normalize /
      # match / CIDR boundary edge cases.
      - name: Run ipmatch unit test
        run: lua5.4 tests/unit/ipmatch_test.lua

      # #78 Phase A: core/blocklist.lua unified pre-handshake
      # blocklist engine. 48 checks: add/remove round-trip,
      # bucket-routed match (v4 + v6), priority order
      # (manual > geoip > external), stealth-flag plumbing,
      # expires_at TTL, reload-from-disk cache rebuild, persistence
      # round-trip via stubbed util.savetable/loadtable.
      - name: Run blocklist unit test
        run: lua5.4 tests/unit/blocklist_test.lua

      # #78 allowlist: core/whitelist.lua global IP/CIDR allowlist.
      # 63 checks: add/remove/list/count, v4+v6+CIDR match, v4-mapped
      # v6 lookup, expires_at, reload-from-disk, disabled-engine,
      # empty-store fast path, plus a blocklist integration block
      # proving Model-A precedence (whitelist overrides an automated
      # block, a manual pin still wins) - the integration checks
      # provably fail on a blocklist without the whitelist hook.
      - name: Run whitelist unit test
        run: lua5.4 tests/unit/whitelist_test.lua

      # #78 Phase D1: core/mmdb.lua pure-Lua MaxMind DB reader. 75
      # checks against MaxMind's canonical test databases (all three
      # record sizes 24/28/32, both IP families, v4-in-v6 embedding,
      # every data-section type, realistic Country schema) with
      # expected values from the reference maxminddb reader.
      - name: Run mmdb unit test
        run: lua5.4 tests/unit/mmdb_test.lua

      # #78 Phase D2: scripts/etc_geoip.lua country/ASN policy blocking.
      # Drives the plugin's resolve/classify/onConnect logic against the
      # real GeoLite2-Country fixture (block + log_only + op-exempt +
      # disabled + missing-DB + v4-mapped dual-stack paths).
      - name: Run etc_geoip unit test
        run: lua5.4 tests/unit/etc_geoip_test.lua

      # #78 Phase D3: in-hub GeoLite2 auto-update orchestration + tar
      # extractor (mocked http_client / sha256 / zlib_stream / mmdb).
      - name: Run geoip_update unit test
        run: lua5.4 tests/unit/geoip_update_test.lua

      # #78 Phase E: external-feed plugin. Drives the line + Spamhaus-JSON
      # parsers (real dkjson) and the fetch -> parse -> bulk_replace flow +
      # failure paths via a mocked http_client / blocklist.
      - name: Run etc_blocklist_feeds unit test
        run: lua5.4 tests/unit/etc_blocklist_feeds_test.lua

      # #78 Phase F: proxy/VPN detection plugin. Drives query_ip SSRF
      # validation, the proxycheck interpret, and the async lookup ->
      # kick / store-push flow + SID-reuse / fail-open / quota guards
      # via a mocked http_client / blocklist / hub.
      - name: Run etc_proxydetect unit test
        run: lua5.4 tests/unit/etc_proxydetect_test.lua

      # etc_status_push: the public-status heartbeat. Stubbed hub / cfg /
      # secrets / signal / http_client verify the POST shape (Bearer token
      # + JSON {name,users,uptime}), the interval throttle + in_flight
      # guard, and the inert paths (no token / url / http_client).
      - name: Run etc_status_push unit test
        run: lua5.4 tests/unit/etc_status_push_test.lua

      # usr_uptime: per-user monthly online-time accounting. Regression
      # for #405 - the periodic credit must not be starved by logout
      # churn (set_stop no longer resets the timer gate) and must survive
      # a +reload (onStart re-seeds already-online users). Drives the
      # captured listeners over a controlled clock.
      - name: Run usr_uptime unit test
        run: lua5.4 tests/unit/usr_uptime_test.lua

      # hub_runtime (#445): the persisted runtime store moved from the
      # shipped core/hci.lua to scripts/data/hub_runtime.tbl with a
      # one-time migration. Tests the pure decision + the load-time
      # side effect over an in-memory fs.
      - name: Run hub_runtime migration unit test
        run: lua5.4 tests/unit/hub_runtime_migration_test.lua

      # etc_records (#465): a missing / empty / corrupt records .tbl must
      # not crash the onLogin max-tracking comparisons.
      - name: Run etc_records unit test
        run: lua5.4 tests/unit/etc_records_test.lua

      # etc_webhook (#398): inbound webhook receiver. Uses the REAL
      # core/hmac.lua so signature verification is genuinely exercised.
      # Covers HMAC pass / wrong / missing, sha256= prefix, event filter,
      # dedup, template {dotted.path}/{event}, control-byte strip +
      # truncation, flood cap, min_level gating, no-secret-skip, inert.
      - name: Run etc_webhook unit test
        run: lua5.4 tests/unit/etc_webhook_test.lua

      # etc_cmdlog (#460): the command log is stored language-neutral and
      # re-localized at read-time. Verifies an entry written under one
      # language renders in the current language after a switch, old baked
      # lines fall back to raw, control bytes are stripped, HTTP re-localizes.
      - name: Run etc_cmdlog unit test
        run: lua5.4 tests/unit/etc_cmdlog_test.lua

      # cmd_userinfo (#459): the +userinfo value column must line up. Drives
      # the real align_labels against both shipped lang files and asserts the
      # raw format is ragged (the bug) and the aligned one is uniform.
      - name: Run cmd_userinfo align unit test
        run: lua5.4 tests/unit/cmd_userinfo_align_test.lua

      # nick-prefix resolution: +ban / +disconnect / +gag / +redirect /
      # +hideshare / +msgmanager must resolve a prefixed online user by
      # their base nick (usr_nick_prefix re-keys the hub nick table).
      # Drives each patched resolution and asserts the prefixed user is
      # kicked/gagged/redirected/share-toggled/resolved, not sent down the
      # offline path.
      - name: Run nick-prefix resolution unit test
        run: lua5.4 tests/unit/nick_prefix_resolution_test.lua

      # bot_session_chat: session-chat owner + members are keyed by
      # firstnick, so +add/+del by a typed base nick resolves a prefixed
      # online user and stores/matches the firstnick.
      - name: Run bot_session_chat nick-prefix unit test
        run: lua5.4 tests/unit/bot_session_chat_prefix_test.lua

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Install into staging tree
        run: cmake --install build

      # #315 adclib unescape regression test. Requires the built
      # adclib.so and the dynamic linker resolving its OpenSSL deps
      # AND the bundled liblua.so it links against (a fresh `lua5.4`
      # has its own liblua, not ours). Set LD_LIBRARY_PATH=. so
      # ld.so picks up the staging tree's liblua first.
      - name: Run adclib_unescape unit test
        run: |
          cd build/install/luadch
          LD_LIBRARY_PATH=. lua5.4 ../../../tests/unit/adclib_unescape_test.lua

      # zlib_stream.gunzip() C round-trip (GeoIP auto-update precursor).
      # Same install-tree + bundled-liblua requirement as adclib above, so
      # Linux-only (msys2 lua segfaults loading our C modules).
      - name: Run zlib_stream unit test
        run: |
          cd build/install/luadch
          LD_LIBRARY_PATH=. lua5.4 ../../../tests/unit/zlib_stream_test.lua

      # core/backup_archive.lua real AES-256-GCM round-trip (#480 P0):
      # pack/unpack fidelity, ciphertext secrecy, wrong-passphrase + GCM
      # tamper rejection. Same install-tree + bundled-liblua + adclib
      # requirement as the two C-module tests above, so Linux-only.
      - name: Run backup_archive crypto unit test
        run: |
          cd build/install/luadch
          LD_LIBRARY_PATH=. lua5.4 ../../../tests/unit/backup_archive_crypto_test.lua

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Static guard: the built-in fallback cfg (used when cfg/cfg.tbl is
      # missing) must not list an unbundled plugin. The normal boot uses
      # examples/cfg (covered by the smoke below); this covers the other path.
      - name: Check default cfg scripts are bundled
        run: python3 tests/check_default_cfg_scripts.py

      - name: Run smoke tests
        run: python3 tests/smoke/run.py build/install/luadch

  smoke-windows:
    name: Smoke Windows x86_64 (MinGW UCRT64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-lua54

      # Pin the msys2 Lua to the lua54 package (Lua 5.4.8, binary
      # `lua5.4.exe`) rather than the unversioned `lua` package, which
      # rolling-release msys2 bumped to Lua 5.5 - where generic-for
      # control variables are const, so 5.4-valid code (e.g. reassigning
      # a for loop var) fails to even parse. The hub bundles + runs Lua
      # 5.4.8, so the unit tests MUST run under 5.4.x to validate against
      # the real runtime. lua54 provides `lua5.4`, matching the Linux
      # leg's `lua5.4` (apt lua5.4) invocation.

      # #275 COV-2 holistic review follow-up: the Lua-side unit tests
      # MUST run on Windows too. Linux-only coverage masks divergences
      # in the MinGW UCRT64 Lua 5.4 build (locale-dependent string
      # ops, integer-width / pattern-class edge cases). Same set as the
      # Linux job (minus the two C-module tests, which are Linux-only),
      # same order.
      - name: Run iostream unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/iostream_test.lua

      - name: Run bloom unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/bloom_test.lua

      - name: Run sysinfo unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/sysinfo_test.lua

      - name: Run http_router unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/http_router_test.lua

      - name: Run util_http unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/util_http_test.lua

      - name: Run util_safe_path unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/util_safe_path_test.lua

      - name: Run util_makedir unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/util_makedir_test.lua

      - name: Run ensuredirs unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/ensuredirs_test.lua

      - name: Run cfg_secret unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/cfg_secret_test.lua

      - name: Run http_filter unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/http_filter_test.lua

      - name: Run http_client unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/http_client_test.lua

      - name: Run hbri unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/hbri_test.lua

      - name: Run lang unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/lang_test.lua

      - name: Run plugin lang unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/plugin_lang_test.lua

      - name: Run etc_aliases unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_aliases_test.lua

      - name: Run cmd_gag bot-guard unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/cmd_gag_bot_test.lua

      - name: Run etc_hubcommands unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_hubcommands_test.lua

      - name: Run audit unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/audit_test.lua

      - name: Run etc_clientblocker unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_clientblocker_test.lua

      - name: Run etc_blocklist unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_blocklist_test.lua

      - name: Run etc_whitelist unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_whitelist_test.lua

      - name: Run cmd_usercleaner orphan unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/cmd_usercleaner_orphan_test.lua

      - name: Run secrets unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/secrets_test.lua

      - name: Run ratelimit unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/ratelimit_test.lua

      - name: Run cfg_defaults unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/cfg_defaults_test.lua

      - name: Run sha256 unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/sha256_test.lua

      - name: Run hmac unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/hmac_test.lua

      - name: Run backup_archive unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/backup_archive_test.lua

      - name: Run cacert_bootstrap unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/cacert_bootstrap_test.lua

      - name: Run ipmatch unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/ipmatch_test.lua

      - name: Run blocklist unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/blocklist_test.lua

      - name: Run whitelist unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/whitelist_test.lua

      # #78 Phase D1: pure-Lua MaxMind DB reader (see Linux job note).
      - name: Run mmdb unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/mmdb_test.lua

      # #78 Phase D2: etc_geoip country/ASN blocking (see Linux job note).
      - name: Run etc_geoip unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_geoip_test.lua

      # #78 Phase D3: in-hub GeoLite2 auto-update (see Linux job note).
      - name: Run geoip_update unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/geoip_update_test.lua

      # #78 Phase E: external-feed plugin (see Linux job note).
      - name: Run etc_blocklist_feeds unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_blocklist_feeds_test.lua

      # #78 Phase F: proxy/VPN detection plugin (see Linux job note).
      - name: Run etc_proxydetect unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_proxydetect_test.lua

      # public-status heartbeat (see Linux job note).
      - name: Run etc_status_push unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_status_push_test.lua

      - name: Run usr_uptime unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/usr_uptime_test.lua

      - name: Run hub_runtime migration unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/hub_runtime_migration_test.lua

      - name: Run etc_records unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_records_test.lua

      - name: Run etc_webhook unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_webhook_test.lua

      - name: Run etc_cmdlog unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/etc_cmdlog_test.lua

      - name: Run cmd_userinfo align unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/cmd_userinfo_align_test.lua

      - name: Run nick-prefix resolution unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/nick_prefix_resolution_test.lua

      - name: Run bot_session_chat nick-prefix unit test
        shell: msys2 {0}
        run: lua5.4 tests/unit/bot_session_chat_prefix_test.lua

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=/ucrt64

      - name: Build
        shell: msys2 {0}
        run: cmake --build build -j

      - name: Install into staging tree
        shell: msys2 {0}
        run: cmake --install build

      # #315 adclib unescape regression test runs on the Linux job
      # only. On Windows, loading the bundled adclib.dll under the
      # msys2 `lua` interpreter segfaults - msys2's lua brings its
      # own liblua and our adclib.dll is linked against the bundled
      # lua.dll, so two liblua instances end up in the same process
      # and the Lua-state ABI collides. Fixing that would mean
      # bundling a standalone lua.exe linked against our liblua, or
      # using Luadch.exe as a script runner (which bootstraps the
      # whole hub). Linux coverage is sufficient for the C-level
      # behaviour; the Windows build is exercised by the smoke
      # harness below.

      # Use the native Windows Python rather than msys2's: the smoke
      # harness uses sys.platform == "win32" to pick make_cert.bat over
      # make_cert.sh (msys2 bash mangles the "/CN=..." subject name via
      # POSIX-to-Windows path conversion). msys2 Python reports
      # sys.platform == "msys" which would skip the Windows code path.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check default cfg scripts are bundled
        shell: pwsh
        run: python tests/check_default_cfg_scripts.py

      - name: Run smoke tests
        shell: pwsh
        run: python tests/smoke/run.py build/install/luadch
